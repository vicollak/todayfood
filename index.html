<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hôm Nay Ăn Gì</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,sans-serif;background:#f3f4f6}
.app{height:100vh;display:flex;flex-direction:column;gap:12px;padding:12px;max-width:700px;margin:auto}
.card{background:#fff;border-radius:16px;padding:12px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.row{display:flex;gap:8px}
input{flex:1;padding:12px;border:1px solid #ddd;border-radius:12px}
button{border:none;border-radius:12px;padding:12px;cursor:pointer}
.add{background:#2563eb;color:#fff}
.random{width:100%;background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;font-size:20px;font-weight:bold}
.list{flex:1;overflow:hidden}
#foods{list-style:none;padding:0;margin:0;height:100%;overflow:auto}
#foods li{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee}
.slot{height:120px;background:#111827;color:#fff;border-radius:16px;overflow:hidden;position:relative}
.track{position:absolute;display:flex;align-items:center;height:100%;gap:40px;left:0;top:0;will-change:transform}
.item{font-size:32px;font-weight:700;min-width:220px;text-align:center}
.marker{position:absolute;left:50%;top:0;bottom:0;width:4px;background:#22c55e;transform:translateX(-50%)}
.result{text-align:center;font-size:28px;font-weight:700}
</style>
</head>
<body>
<div class="app">
<div class="card"><div class="row"><input id="foodInput"><button class="add" onclick="addFood()">Thêm</button></div></div>
<div class="card list"><ul id="foods"></ul></div>
<div class="card">
<div class="slot"><div class="marker"></div><div id="track" class="track"></div></div>
<br><button class="random" onclick="spin()">🎲 Random</button>
</div>
<div class="card"><div id="result" class="result">Chưa chọn món</div></div>
</div>
<script>
let foods=JSON.parse(localStorage.getItem("foods")||'["Phở","Bún bò","Cơm tấm","Pizza"]');
function save(){localStorage.setItem("foods",JSON.stringify(foods));render();}
function render(){
let ul=document.getElementById("foods");
ul.innerHTML="";
foods.forEach((f,i)=>ul.innerHTML+=`<li>${f}<span><button onclick="editFood(${i})">Sửa</button> <button onclick="delFood(${i})">Xóa</button></span></li>`);
}
function addFood(){let v=foodInput.value.trim();if(!v)return;foods.push(v);foodInput.value="";save();}
function delFood(i){foods.splice(i,1);save();}
function editFood(i){let v=prompt("Sửa",foods[i]);if(v&&v.trim()){foods[i]=v.trim();save();}}
render();

let spinning=false;
async function spin(){
 if(spinning||foods.length===0)return;
 spinning=true;
 const winner=foods[Math.floor(Math.random()*foods.length)];
 const track=document.getElementById("track");
 const result=document.getElementById("result");
 result.textContent="Đang chọn...";

 let pool=[];
 for(let i=0;i<80;i++) pool.push(foods[Math.floor(Math.random()*foods.length)]);
 pool.push(winner);
 for(let i=0;i<10;i++) pool.push(foods[Math.floor(Math.random()*foods.length)]);

 track.innerHTML=pool.map(x=>`<div class="item">🍜 ${x}</div>`).join("");

 await new Promise(r=>setTimeout(r,50));

 const items=track.querySelectorAll(".item");
 const winIndex=80;
 const target=items[winIndex].offsetLeft - window.innerWidth/2 + items[winIndex].offsetWidth/2;

 track.style.transition="none";
 track.style.transform="translateX(0px)";
 void track.offsetWidth;

 track.style.transition="transform 5s cubic-bezier(.08,.8,.15,1)";
 track.style.transform=`translateX(${-target}px)`;

 setTimeout(()=>{
   result.innerHTML=`🏆 ${winner}`;
   spinning=false;
 },5100);
}
</script>
</body>
</html>
