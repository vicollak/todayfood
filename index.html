<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hôm Nay Ăn Gì?</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#2563eb">

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:#f3f4f6;
    color:#111827;
}

.container{
    max-width:700px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
}

.card{
    background:white;
    border-radius:16px;
    padding:16px;
    margin-bottom:16px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.input-row{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:12px;
    border-radius:10px;
    border:1px solid #ccc;
}

button{
    border:none;
    border-radius:10px;
    padding:12px 16px;
    cursor:pointer;
}

.add-btn{
    background:#2563eb;
    color:white;
}

.random-btn{
    width:100%;
    font-size:20px;
    background:#16a34a;
    color:white;
}

ul{
    list-style:none;
    padding:0;
    margin:0;
}

li{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 0;
    border-bottom:1px solid #eee;
}

.actions{
    display:flex;
    gap:5px;
}

.edit{
    background:#f59e0b;
    color:white;
}

.delete{
    background:#dc2626;
    color:white;
}

#result{
    text-align:center;
    font-size:32px;
    font-weight:bold;
    min-height:80px;
}

.spin{
    animation:pulse .2s infinite;
}

@keyframes pulse{
    0%{transform:scale(1)}
    50%{transform:scale(1.03)}
    100%{transform:scale(1)}
}
</style>
</head>

<body>

<div class="container">

    <h1>🍜 Hôm Nay Ăn Gì?</h1>

    <div class="card">

        <div class="input-row">
            <input id="foodInput" placeholder="Nhập món ăn">
            <button class="add-btn" onclick="addFood()">Thêm</button>
        </div>

    </div>

    <div class="card">
        <ul id="foodList"></ul>
    </div>

    <div class="card">
        <button class="random-btn" onclick="pickRandom()">
            🎲 Random Hôm Nay
        </button>
    </div>

    <div class="card">
        <div id="result">Chưa chọn món</div>
    </div>

</div>

<script>

let foods = JSON.parse(
    localStorage.getItem("foods") || "[]"
);

let spinning = false;

function save(){
    localStorage.setItem(
        "foods",
        JSON.stringify(foods)
    );
}

function render(){

    const list =
        document.getElementById("foodList");

    list.innerHTML = "";

    foods.forEach((food,index)=>{

        const li =
            document.createElement("li");

        li.innerHTML = `
            <span>${food}</span>

            <div class="actions">
                <button class="edit"
                    onclick="editFood(${index})">
                    Sửa
                </button>

                <button class="delete"
                    onclick="deleteFood(${index})">
                    Xóa
                </button>
            </div>
        `;

        list.appendChild(li);

    });
}

function addFood(){

    const input =
        document.getElementById("foodInput");

    const value =
        input.value.trim();

    if(!value) return;

    foods.push(value);

    save();
    render();

    input.value = "";
}

function deleteFood(index){

    foods.splice(index,1);

    save();
    render();
}

function editFood(index){

    const value =
        prompt("Sửa món ăn", foods[index]);

    if(value === null) return;

    const v = value.trim();

    if(!v) return;

    foods[index] = v;

    save();
    render();
}

async function pickRandom(){

    if(spinning) return;

    if(foods.length === 0){

        result.innerHTML =
            "Thêm món trước đã 😑";

        return;
    }

    spinning = true;

    const resultDiv =
        document.getElementById("result");

    resultDiv.classList.add("spin");

    let speed = 50;

    for(let i=0;i<40;i++){

        const temp =
            foods[Math.floor(
                Math.random()*foods.length
            )];

        resultDiv.innerHTML =
            "🎲 " + temp;

        await new Promise(r =>
            setTimeout(r,speed)
        );

        speed += 5;
    }

    const chosen =
        foods[Math.floor(
            Math.random()*foods.length
        )];

    resultDiv.classList.remove("spin");

    resultDiv.innerHTML =
        "🍽️<br>" + chosen;

    spinning = false;
}

render();

if("serviceWorker" in navigator){
    navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
